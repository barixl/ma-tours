<style>
/* Guaranteed Solid Background on Scroll */
.nav-scrolled {
    background-color: #ffffff !important;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
}

/* Mobile Menu Slide Animation */
.slide-enter-active, .slide-leave-active {
    transition: max-height 0.3s ease-in-out, opacity 0.3s ease-in-out;
    overflow: hidden;
}
.slide-enter-from, .slide-leave-to {
    max-height: 0;
    opacity: 0;
}
.slide-enter-to, .slide-leave-from {
    max-height: 400px;
    opacity: 1;
}
</style>

<!-- Header Wrapper (Includes Announcement + Navbar) -->
<div id="navbar-app">
<header class="fixed top-0 w-full z-50 flex flex-col transition-all duration-300"
        :class="{'nav-scrolled': isScrolled, 'bg-transparent': !isScrolled}">
    
    <!-- Announcement Bar -->
    {% if announcement %}
    <div v-show="!isScrolled" class="bg-primary-600 text-white text-xs sm:text-sm font-medium py-2 px-4 text-center w-full transition-all duration-300">
        <span>{{ announcement.text }}</span>
        {% if announcement.link %}
        <a href="{{ announcement.link }}" class="underline ml-2 hover:text-primary-100 transition-colors">Learn More</a>
        {% endif %}
    </div>
    {% endif %}

    <!-- Navigation Bar -->
    <nav class="w-full transition-all duration-300" :class="{'py-3': isScrolled, 'py-5': !isScrolled}">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="relative flex justify-between items-center">
                <!-- Logo -->
                <div class="w-full flex justify-center md:w-auto md:justify-start">
                    <a href="{{ url_for('public.home') }}" class="flex items-center gap-2">
                        <img v-if="!isScrolled && isTransparentPage" src="{{ url_for('static', filename='white-name-svg.svg') }}" alt="M.A. Tours Logo" class="h-12 md:h-14 w-auto" />
                        <img v-else src="{{ url_for('static', filename='logo-svg.svg') }}" alt="M.A. Tours Logo" class="h-12 md:h-14 w-auto" />
                    </a>
                </div>

                <!-- Desktop Menu -->
                <div class="hidden md:flex items-center space-x-8">
                    <a href="{{ url_for('public.home') }}" class="text-sm font-medium transition-colors hover:text-primary-500" :class="{'text-gray-600': isScrolled || !isTransparentPage, 'text-white/90': !isScrolled && isTransparentPage}">Home</a>
                    <a href="{{ url_for('public.destinations_list') }}" class="text-sm font-medium transition-colors hover:text-primary-500" :class="{'text-gray-600': isScrolled || !isTransparentPage, 'text-white/90': !isScrolled && isTransparentPage}">Destinations</a>
                    <a href="{{ url_for('public.packages_list') }}" class="text-sm font-medium transition-colors hover:text-primary-500" :class="{'text-gray-600': isScrolled || !isTransparentPage, 'text-white/90': !isScrolled && isTransparentPage}">Packages</a>
                    <a href="{{ url_for('public.activities_list') }}" class="text-sm font-medium transition-colors hover:text-primary-500" :class="{'text-gray-600': isScrolled || !isTransparentPage, 'text-white/90': !isScrolled && isTransparentPage}">Activities</a>
                    <a href="{{ url_for('public.gallery') }}" class="text-sm font-medium transition-colors hover:text-primary-500" :class="{'text-gray-600': isScrolled || !isTransparentPage, 'text-white/90': !isScrolled && isTransparentPage}">Gallery</a>
                    <a href="{{ url_for('public.about') }}" class="text-sm font-medium transition-colors hover:text-primary-500" :class="{'text-gray-600': isScrolled || !isTransparentPage, 'text-white/90': !isScrolled && isTransparentPage}">About</a>
                    <a href="{{ url_for('public.contact') }}" class="text-sm font-medium transition-colors hover:text-primary-500" :class="{'text-gray-600': isScrolled || !isTransparentPage, 'text-white/90': !isScrolled && isTransparentPage}">Contact</a>
                    
                    <!-- Search Mock Icon -->
                    <button class="text-sm font-medium transition-colors hover:text-primary-500 flex items-center" :class="{'text-gray-600': isScrolled || !isTransparentPage, 'text-white/90': !isScrolled && isTransparentPage}">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    </button>
                </div>

                <!-- CTA Button -->
                <div class="hidden md:flex">
                    <a href="{{ url_for('public.home') }}#inquiry-app" class="btn px-6 py-2.5 text-sm font-semibold rounded-full shadow-sm hover:shadow-md hover:-translate-y-0.5 transition-all" 
                       :class="{'bg-primary-600 text-white hover:bg-primary-700': isScrolled || !isTransparentPage, 'bg-white text-gray-900 hover:bg-gray-50': !isScrolled && isTransparentPage}">
                        Plan Trip
                    </a>
                </div>

                <!-- Mobile menu button -->
                <div class="absolute right-0 top-1/2 -translate-y-1/2 md:static md:translate-y-0 md:hidden flex items-center">
                    <button @click="isMobileMenuOpen = !isMobileMenuOpen" class="focus:outline-none" :class="{'text-gray-800': isScrolled || !isTransparentPage, 'text-white': !isScrolled && isTransparentPage}">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path v-if="!isMobileMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                            <path v-else stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Mobile menu dropdown -->
        <transition name="slide">
            <div v-show="isMobileMenuOpen" style="display: none;" class="md:hidden bg-white shadow-xl absolute w-full left-0 top-full border-t border-gray-100">
                <div class="px-4 pt-2 pb-6 space-y-1">
                    <a href="{{ url_for('public.home') }}" class="block px-3 py-3 text-base font-medium text-gray-800 border-b border-gray-50">Home</a>
                    <a href="{{ url_for('public.destinations_list') }}" class="block px-3 py-3 text-base font-medium text-gray-800 border-b border-gray-50">Destinations</a>
                    <a href="{{ url_for('public.packages_list') }}" class="block px-3 py-3 text-base font-medium text-gray-800 border-b border-gray-50">Packages</a>
                    <a href="{{ url_for('public.activities_list') }}" class="block px-3 py-3 text-base font-medium text-gray-800 border-b border-gray-50">Activities</a>
                    <a href="{{ url_for('public.gallery') }}" class="block px-3 py-3 text-base font-medium text-gray-800 border-b border-gray-50">Gallery</a>
                    <a href="{{ url_for('public.about') }}" class="block px-3 py-3 text-base font-medium text-gray-800 border-b border-gray-50">About</a>
                    <a href="{{ url_for('public.contact') }}" class="block px-3 py-3 text-base font-medium text-gray-800">Contact</a>
                    <div class="mt-4 px-3">
                        <a href="{{ url_for('public.home') }}#inquiry-app" class="block w-full text-center btn btn-primary py-3">Plan Trip</a>
                    </div>
                </div>
            </div>
        </transition>
    </nav>
</header>

<!-- Floating Quick Actions -->
<div class="fixed bottom-20 md:bottom-6 right-6 z-40 flex flex-col gap-3">
    <!-- WhatsApp Chat (Mobile/Desktop) -->
    <a href="https://wa.me/{{ settings.whatsapp|replace(' ', '')|replace('+', '')|replace('-', '') if settings and settings.whatsapp else '917304916310' }}?text={{ 'Hi, I am interested in planning a tour. Can you help me?'|urlencode }}" 
       target="_blank" rel="noopener noreferrer"
       class="w-12 h-12 rounded-full flex items-center justify-center shadow-lg hover:scale-105 transition-all duration-300"
       :class="{
           'bg-[#25D366] text-white hover:bg-[#1ebd59]': !(!isScrolled && isTransparentPage && isHomepage),
           'bg-white text-[#25D366] hover:bg-gray-50 border border-gray-100': !isScrolled && isTransparentPage && isHomepage
       }"
       title="Chat on WhatsApp">
        <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24">
            <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884-.001 2.225.651 3.891 1.746 5.634l-.999 3.648 3.742-.981zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.916-2.206-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.347-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.876 1.213 3.074.149.198 2.095 3.2 5.076 4.487.709.299 1.263.478 1.694.611.711.22 1.36.189 1.872.114.576-.084 1.758-.719 2.006-1.413.248-.695.248-1.29.173-1.414z"/>
        </svg>
    </a>
    
    <!-- Phone Call (Mobile Only) -->
    <a href="tel:{{ settings.phone|replace(' ', '')|replace('+', '')|replace('-', '') if settings and settings.phone else '+917304916310' }}" 
       class="md:hidden w-12 h-12 rounded-full bg-[#0084FF] hover:bg-[#0072DD] text-white flex items-center justify-center shadow-lg hover:scale-105 transition-all duration-300"
       title="Call Us">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
        </svg>
    </a>
</div>
</div>
